[project]
name = "texport"
version = "2026.3.0"
description = "Convert LaTeX documents to accessible HTML with PDF output"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "beautifulsoup4>=4.14.3",
]

[project.scripts]
texport = "main:process_files"
texport-index = "create_main_index:main"
texport-clean = "main:clean_logs"

[dependency-groups]
dev = [
    "basedpyright>=1.38.3",
    "pyright>=1.1.408",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.15.7",
]

[tool.setuptools]
py-modules = ["main", "config", "create_main_index", "embed_assets", "zip_project"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.pyright]
venvPath = "."
venv = ".venv"
